# Astra-Inspired Color Scheme for foobar2000
# Deep, vibrant colors with neon accents
# Edit these values and restart foobar2000 to apply changes

[Colors]
# Background Colors
background_primary=#0A0A0F
background_secondary=#151520
background_panel=#1A1A28
background_highlight=#252535

# Accent Colors (inspired by Astra)
accent_primary=#BF00FF
accent_secondary=#39FF14
accent_tertiary=#FF6000
accent_purple=#6A0DAD
accent_cyan=#00D9FF

# Text Colors
text_primary=#FFFFFF
text_secondary=#AAAAAA
text_tertiary=#666666
