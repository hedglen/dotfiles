[paths]
inbox        = "R:/Media/x/dl"
movies       = "R:/Media/Movies"
tv           = "R:/Media/TV Shows"
music_videos = "R:/Media/Music Videos"
x            = "R:/Media/x"

[extensions]
video = [".mkv", ".mp4", ".avi", ".mov", ".wmv", ".flv", ".webm", ".m4v", ".ts", ".m2ts", ".mpg", ".mpeg"]

# Files whose names match any of these patterns go to x by default
[x_patterns]
prefixes = ["PMV", "SFM", "MMD"]
keywords = ["PAWG", "TITS", "BBC", "bbc", "cock", "deepthroat", "slut"]
